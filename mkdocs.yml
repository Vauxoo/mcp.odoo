site_name: Odoo MCP Multi
site_description: MCP Server for connecting Claude/Cursor to multiple Odoo instances
site_author: "nhomar [Vauxoo]"
site_url: https://vauxoo.github.io/odoo-mcp-multi/
repo_url: https://git.vauxoo.com/nhomar/mcp.odoo

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - MCP Tools: mcp-tools.md
  - CLI Reference: cli.md
  - Contributing: contributing.md
