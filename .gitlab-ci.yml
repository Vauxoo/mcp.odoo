stages:
  - lint
  - test
  - release
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip/

.python-template:
  image: python:3.12-slim
  before_script:
    - pip install --upgrade pip
    - pip install -e ".[dev]"

lint:
  extends: .python-template
  stage: lint
  script:
    - ruff check odoo_mcp_multi/
    - ruff format --check odoo_mcp_multi/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

lint-markdown:
  image: node:20-slim
  stage: lint
  script:
    - npm install -g markdownlint-cli2
    - markdownlint-cli2 "**/*.md" "#node_modules"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG


test:
  extends: .python-template
  stage: test
  script:
    - pytest --cov=odoo_mcp_multi --cov-report=term --cov-report=xml
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

# ---------------------------------------------------------------------------
# Auto-release: runs on main after lint+test pass.
# The bumpversion commit_message includes [skip ci] to break the loop.
#
# Bump level logic (commit-format agnostic):
#   - Default: patch (0.3.0 → 0.3.1)
#   - [minor] in any commit message → minor (0.3.0 → 0.4.0)
#   - [major] in any commit message → major (0.4.0 → 1.0.0)
#   - [skip release] in any commit message → no release
#
# Pushes a version commit + tag, which triggers the publish:* jobs.
#
# Requires CI/CD variable: RELEASE_TOKEN (project access token with
# write_repository scope). Set in Settings → CI/CD → Variables.
# ---------------------------------------------------------------------------
auto-release:
  extends: .python-template
  stage: release
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git
    - pip install --upgrade pip
    - pip install -e ".[dev]"
  script:
    - |
      echo "==> Syncing tags with remote (pruning stale local tags)..."
      git fetch --tags --prune --prune-tags
      LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
      if [ -n "$LAST_TAG" ]; then
        COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"%s" 2>/dev/null)
      else
        COMMITS=$(git log --pretty=format:"%s" -20)
      fi
      echo "$COMMITS"

      if echo "$COMMITS" | grep -qi "\[skip release\]"; then
        echo "==> [skip release] found. Skipping."
        exit 0
      fi

      BUMP_LEVEL="patch"
      if echo "$COMMITS" | grep -qi "\[major\]"; then
        BUMP_LEVEL="major"
      elif echo "$COMMITS" | grep -qi "\[minor\]"; then
        BUMP_LEVEL="minor"
      fi
      echo "==> Bump level: $BUMP_LEVEL"

      echo "==> Configuring git for push..."
      git config user.name "CI Release Bot"
      git config user.email "ci@vauxoo.com"
      git remote set-url origin "https://release-bot:${RELEASE_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"

      echo "==> Bumping version ($BUMP_LEVEL)..."
      bump-my-version bump $BUMP_LEVEL

      echo "==> Pushing version commit and tag..."
      git push origin HEAD:$CI_DEFAULT_BRANCH --tags

      NEW_TAG=$(git describe --tags --exact-match HEAD)
      echo "==> Released: $NEW_TAG"
  rules:
    # Loop-prevention (layer 1): bump commits have [skip ci] so no pipeline.
    # Loop-prevention (layer 2): this rule never runs when commit IS a bump.
    - if: >-
        $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
        && $CI_COMMIT_TAG == null
        && $CI_COMMIT_MESSAGE !~ /^Bump version:/
      when: on_success
  needs:
    - lint
    - test

pages:
  extends: .python-template
  stage: deploy
  script:
    - mkdocs build -d public --strict
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

publish:pypi:
  extends: .python-template
  stage: deploy
  script:
    - pip install build twine
    - python -m build
    - twine upload --verbose dist/*
  rules:
    - if: $CI_COMMIT_TAG

publish:gitlab:
  extends: .python-template
  stage: deploy
  script:
    - pip install build twine
    - python -m build
    - TWINE_PASSWORD=${CI_JOB_TOKEN} TWINE_USERNAME=gitlab-ci-token python -m twine upload --verbose --repository-url ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/pypi dist/*
  rules:
    - if: $CI_COMMIT_TAG
